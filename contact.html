<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Shah - Contact</title>
    <meta name="description" content="Personal portfolio of Meet Shah, showcasing projects and skills.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0f',
                        primary: '#7c3aed', // Electric violet
                        secondary: '#f59e0b', // Amber/Warm Accent
                        cardBg: 'rgba(255, 255, 255, 0.03)',
                        cardBorder: 'rgba(255, 255, 255, 0.08)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Syne', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'gradient-text': 'gradientText 8s ease infinite',
                        'spin-slow': 'spin 20s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        gradientText: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass-card {
                @apply bg-cardBg backdrop-blur-xl border border-cardBorder rounded-2xl;
            }
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-primary via-[#a78bfa] to-secondary animate-gradient-text;
                background-size: 200% auto;
            }
            .reveal {
                @apply opacity-0 translate-y-8 transition-all duration-1000 ease-out;
            }
            .reveal.active {
                @apply opacity-100 translate-y-0;
            }
        }
        
        body {
            background-color: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a35;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7c3aed;
        }
        
        /* Input autofill default styles override */
        input:-webkit-autofill,
        textarea:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #0a0a0f inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
</head>
<body class="antialiased selection:bg-primary/30 selection:text-white flex flex-col min-h-screen">

    <!-- Custom Cursor Aura (Desktop Only) -->
    <div id="custom-cursor" class="fixed top-0 left-0 w-8 h-8 pointer-events-none z-[9999] mix-blend-screen hidden md:block -translate-x-1/2 -translate-y-1/2">
        <div class="absolute inset-0 bg-primary rounded-full opacity-50 blur-[10px] transform scale-100 transition-transform duration-300 ring-2 ring-white/20" id="cursor-glow"></div>
        <div class="absolute inset-[10px] bg-white rounded-full shadow-[0_0_15px_#fff]"></div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-300" id="navbar">
        <div class="absolute inset-0 bg-darkBg/60 backdrop-blur-md border-b border-white/5 opacity-0 transition-opacity duration-300" id="nav-backdrop"></div>
        <div class="container mx-auto px-6 py-5 flex items-center justify-between relative z-10">
            <a href="index.html" class="text-xl font-display font-bold text-white tracking-widest hover:text-primary transition-colors magnetic">Meet Shah.</a>
            
            <!-- Desktop Links -->
            <div class="hidden md:flex gap-10">
                <a href="index.html" class="nav-link text-sm font-medium text-white/60 hover:text-white transition-colors relative group">
                    Home
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full hidden"></span>
                </a>
                <a href="projects.html" class="nav-link text-sm font-medium text-white/60 hover:text-white transition-colors relative group">
                    Projects
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full hidden"></span>
                </a>
                <a href="contact.html" class="nav-link text-sm font-medium text-white/60 hover:text-white transition-colors relative group">
                    Contact
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full hidden"></span>
                </a>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="md:hidden text-white/70 hover:text-white p-2" aria-label="Toggle Menu" id="mobile-menu-btn">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow pt-20">
        <!-- CONTACT PAGE -->
        <section id="contact" class="py-24 relative flex items-center min-h-[85vh] bg-black">
            <!-- Animated Background Element behind Contact -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] md:w-[900px] md:h-[900px] bg-gradient-to-tr from-primary/10 via-transparent to-[#06b6d4]/10 rounded-full blur-[120px] animate-spin-slow z-0 pointer-events-none"></div>
            
            <div class="container mx-auto px-6 relative z-10">
                <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-16 lg:gap-24 items-center">
                    
                    <!-- Text & Socials -->
                    <div class="flex-1 reveal lg:pr-10 w-full text-center lg:text-left">
                        <h2 class="text-5xl md:text-7xl lg:text-[5rem] font-display font-bold text-white mb-8 leading-[1.1]">
                            Let's Work <br/>
                            <span class="text-gradient">Together.</span>
                        </h2>
                        <p class="text-gray-400 text-lg md:text-xl mb-12 lg:max-w-md mx-auto lg:mx-0 font-light leading-relaxed">
                            I am currently based in Belfast, UK, and open to new opportunities. Drop a message to say hi!
                        </p>
                        
                        <div class="flex gap-6 justify-center lg:justify-start">
                            <!-- Social Buttons -->
                            <a href="#" class="magnetic w-16 h-16 rounded-full glass-card flex items-center justify-center text-2xl text-white hover:text-white hover:bg-white/10 border border-white/20 hover:border-primary hover:shadow-[0_0_25px_rgba(124,58,237,0.5)] transition-all duration-300 group">
                                <i class="fab fa-github group-hover:scale-110 transition-transform"></i>
                            </a>
                            <a href="#" class="magnetic w-16 h-16 rounded-full glass-card flex items-center justify-center text-2xl text-white hover:text-white hover:bg-[#0a66c2]/20 border border-white/20 hover:border-[#0a66c2] hover:shadow-[0_0_25px_rgba(10,102,194,0.5)] transition-all duration-300 group">
                                <i class="fab fa-linkedin-in group-hover:scale-110 transition-transform text-[#0a66c2] group-hover:text-white"></i>
                            </a>
                            <a href="#" class="magnetic w-16 h-16 rounded-full glass-card flex items-center justify-center text-2xl text-white hover:text-white hover:bg-secondary/20 border border-white/20 hover:border-secondary hover:shadow-[0_0_25px_rgba(245,158,11,0.5)] transition-all duration-300 group">
                                <i class="fas fa-map-marker-alt group-hover:scale-110 transition-transform text-secondary group-hover:text-white"></i>
                            </a>
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <div class="flex-1 reveal [transition-delay:200ms] w-full max-w-lg lg:max-w-none">
                        <form class="glass-card p-8 md:p-12 flex flex-col gap-10 relative overflow-hidden shadow-2xl border-white/10 group/form">
                            <!-- Form internal styling -->
                            <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
                            
                            <div class="relative group mt-4">
                                <input type="text" id="name" required class="block w-full px-0 py-2 text-lg text-white bg-transparent border-0 border-b-2 border-white/20 appearance-none focus:outline-none focus:ring-0 peer transition-colors z-10 relative cursor-text" placeholder=" " />
                                <label for="name" class="absolute text-gray-500 text-lg duration-300 transform -translate-y-8 scale-75 top-2 -z-10 origin-[0] peer-focus:text-primary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-8 tracking-wide font-medium">Your Name</label>
                                <!-- Glowing active border bottom -->
                                <div class="absolute bottom-0 left-0 h-[2px] bg-primary w-0 peer-focus:w-full transition-all duration-500 ease-out shadow-[0_0_15px_rgba(124,58,237,0.8)] z-20"></div>
                            </div>
                            
                            <div class="relative group">
                                <input type="email" id="email" required class="block w-full px-0 py-2 text-lg text-white bg-transparent border-0 border-b-2 border-white/20 appearance-none focus:outline-none focus:ring-0 peer transition-colors z-10 relative cursor-text" placeholder=" " />
                                <label for="email" class="absolute text-gray-500 text-lg duration-300 transform -translate-y-8 scale-75 top-2 -z-10 origin-[0] peer-focus:text-[#06b6d4] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-8 tracking-wide font-medium">Your Email</label>
                                <div class="absolute bottom-0 left-0 h-[2px] bg-[#06b6d4] w-0 peer-focus:w-full transition-all duration-500 ease-out shadow-[0_0_15px_rgba(6,182,212,0.8)] z-20"></div>
                            </div>
                            
                            <div class="relative group">
                                <textarea id="message" rows="4" required class="block w-full px-0 py-2 text-lg text-white bg-transparent border-0 border-b-2 border-white/20 appearance-none focus:outline-none focus:ring-0 peer transition-colors resize-none z-10 relative cursor-text" placeholder=" "></textarea>
                                <label for="message" class="absolute text-gray-500 text-lg duration-300 transform -translate-y-8 scale-75 top-2 -z-10 origin-[0] peer-focus:text-secondary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-8 tracking-wide font-medium">What's on your mind?</label>
                                <div class="absolute bottom-1 left-0 h-[2px] bg-secondary w-0 peer-focus:w-full transition-all duration-500 ease-out shadow-[0_0_15px_rgba(245,158,11,0.8)] z-20"></div>
                            </div>
                            
                            <button type="submit" class="magnetic relative group inline-flex items-center justify-center px-8 py-5 font-bold text-white transition-all duration-500 bg-gradient-to-r from-primary to-[#a78bfa] rounded-xl hover:shadow-[0_0_40px_rgba(124,58,237,0.6)] focus:outline-none mt-6 overflow-hidden border border-white/20 transform hover:-translate-y-1">
                                <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-primary via-[#06b6d4] to-primary opacity-0 group-hover:opacity-100 transition-opacity duration-1000 bg-[length:200%_auto] animate-gradient-text"></span>
                                <span class="relative z-10 flex items-center justify-center gap-3 text-lg tracking-wide">
                                    Send Message 
                                    <i class="fas fa-paper-plane group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform duration-300"></i>
                                </span>
                            </button>
                        </form>
                    </div>
                    
                </div>
            </div>
        </section>
    </main>

    <!-- Footer subtle text -->
    <footer class="w-full text-center text-gray-600 text-sm font-medium tracking-widest uppercase pb-6 pt-10 mt-auto bg-black border-t border-white/5">
        © <span id="year"></span> Meet Shah. All Rights Reserved.
    </footer>

    <!-- JavaScript Interactive Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // Set current year
            document.getElementById('year').textContent = new Date().getFullYear();

            // Mobile Menu Toggle
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.querySelector('.md\\:flex');
            
            // Sticky glassy nav behavior
            const navBackdrop = document.getElementById('nav-backdrop');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navBackdrop.classList.remove('opacity-0');
                    navBackdrop.classList.add('opacity-100');
                } else {
                    navBackdrop.classList.add('opacity-0');
                    navBackdrop.classList.remove('opacity-100');
                }
            });

            // Smooth Scroll Reveal with Intersection Observer
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

            // Custom Cursor Aura
            const cursor = document.getElementById("custom-cursor");
            const cursorGlow = document.getElementById("cursor-glow");
            
            if (cursor && window.matchMedia("(min-width: 768px)").matches) {
                let mouseX = window.innerWidth / 2;
                let mouseY = window.innerHeight / 2;
                let cursorX = mouseX;
                let cursorY = mouseY;
                
                // Track mouse
                document.addEventListener("mousemove", (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                });

                // Smooth follow animation loop
                function animateCursor() {
                    let ease = 0.15;
                    cursorX += (mouseX - cursorX) * ease;
                    cursorY += (mouseY - cursorY) * ease;
                    
                    cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
                    requestAnimationFrame(animateCursor);
                }
                animateCursor();

                // Interactive elements expand cursor glow
                const interactables = document.querySelectorAll('a, button, input, textarea, .accordion-header, .magnetic-img');
                interactables.forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        cursorGlow.classList.replace('scale-100', 'scale-150');
                        cursorGlow.classList.replace('opacity-50', 'opacity-80');
                    });
                    el.addEventListener('mouseleave', () => {
                        cursorGlow.classList.replace('scale-150', 'scale-100');
                        cursorGlow.classList.replace('opacity-80', 'opacity-50');
                    });
                });
            }

            // Magnetic Button Effect
            const magneticElements = document.querySelectorAll('.magnetic');
            magneticElements.forEach((elem) => {
                elem.addEventListener('mousemove', (e) => {
                    const rect = elem.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    
                    // Limit translation
                    elem.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
                });
                
                elem.addEventListener('mouseleave', () => {
                    elem.style.transform = ''; // reset to class defaults
                });
            });
            
            // Accordion Logic
            const accordions = document.querySelectorAll('.accordion-header');
            accordions.forEach(acc => {
                acc.addEventListener('click', () => {
                    const content = acc.nextElementSibling;
                    const icon = acc.querySelector('.accordion-icon');
                    
                    if(content.style.maxHeight) {
                        content.style.maxHeight = null;
                        icon.classList.remove('rotate-180');
                        acc.classList.remove('bg-white/[0.03]');
                    } else {
                        accordions.forEach(other => {
                            if(other !== acc) {
                                other.nextElementSibling.style.maxHeight = null;
                                other.querySelector('.accordion-icon').classList.remove('rotate-180');
                                other.classList.remove('bg-white/[0.03]');
                            }
                        });
                        
                        content.style.maxHeight = content.scrollHeight + "px";
                        icon.classList.add('rotate-180');
                        acc.classList.add('bg-white/[0.03]');
                    }
                });
            });
            
            // Active Link Highlighting in Nav (Updated for Multi-page)
            const navItems = document.querySelectorAll('.nav-link');
            const currentPath = window.location.pathname;
            
            navItems.forEach(item => {
                item.classList.remove('text-white');
                item.classList.add('text-white/60');
                const indicator = item.querySelector('span');
                if(indicator) indicator.classList.remove('w-full', 'block');
                if(indicator) indicator.classList.add('w-0', 'hidden');
                
                const href = item.getAttribute('href');
                if (currentPath.endsWith(href) || (currentPath.endsWith('/') && href === 'index.html')) {
                    item.classList.add('text-white');
                    item.classList.remove('text-white/60');
                    if(indicator) {
                        indicator.classList.remove('w-0', 'hidden');
                        indicator.classList.add('w-full', 'block');
                    }
                }
            });

        });
    </script>
</body>
</html>
