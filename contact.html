<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Shah - Network</title>
    <meta name="description" content="Personal portfolio of Meet Shah, showcasing Business Analytics projects and skills.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#080812',          
                        surface: 'rgba(30, 30, 46, 0.4)',   
                        surfaceHover: 'rgba(40, 40, 60, 0.6)', 
                        borderColors: 'rgba(255, 255, 255, 0.08)',
                        accentPrimary: '#0ea5e9',   // Sky Blue
                        accentSecondary: '#cbd5e1', // Light Slate
                        textMuted: '#94A3B8',       
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(14, 165, 233, 0.3)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-surface backdrop-blur-2xl border border-borderColors shadow-glass rounded-[2rem] overflow-hidden;
            }
            .glass-input {
                @apply bg-white/[0.02] border border-borderColors rounded-xl text-white placeholder-textMuted focus:border-accentPrimary focus:ring-1 focus:ring-accentPrimary outline-none transition-all px-4 py-3 w-full shadow-inner font-sans;
            }
            .tech-header {
                @apply font-mono text-[10px] tracking-[0.25em] font-bold uppercase text-accentPrimary;
            }
            .reveal {
                @apply opacity-0 translate-y-8 transition-all duration-[1000ms] ease-out;
            }
            .reveal.active {
                @apply opacity-100 translate-y-0;
            }
        }
        
        body {
            background-color: #080812;
            color: #E2E8F0;
            overflow-x: hidden;
            /* Space and Time subtle radial grid - Lighter Shade */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(203, 213, 225, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.06), transparent 25%),
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
            background-attachment: fixed;
        }

        .ambient-glow-1 { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(203, 213, 225, 0.1) 0%, rgba(8,8,18,0) 70%); top: -100px; right: -100px; z-index: -1; pointer-events: none; }
        .ambient-glow-2 { position: absolute; width: 800px; height: 800px; background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, rgba(8,8,18,0) 70%); bottom: 20%; left: -200px; z-index: -1; pointer-events: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.5); }
    </style>
</head>
<body class="antialiased selection:bg-accentPrimary/30 selection:text-white flex flex-col min-h-screen relative">
    
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- Floating Navbar -->
    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-full max-w-4xl px-4 z-50">
        <div class="glass-panel rounded-full px-6 py-3 flex items-center justify-between border-white/10 bg-surface/80 backdrop-blur-xl">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-accentSecondary to-accentPrimary flex justify-center items-center group-hover:shadow-[0_0_15px_rgba(0,240,255,0.5)] transition-shadow">
                    <div class="w-2.5 h-2.5 bg-darkBg rounded-full"></div>
                </div>
                <span class="font-sans font-bold tracking-tight text-white">Meet Shah</span>
            </a>
            
            <!-- Links -->
            <div class="hidden md:flex items-center gap-8 bg-black/20 rounded-full px-6 py-1.5 border border-white/5 shadow-inner">
                <a href="index.html" class="nav-link font-sans text-xs font-semibold text-textMuted hover:text-white transition-colors relative">
                    Overview
                </a>
                <a href="projects.html" class="nav-link font-sans text-xs font-semibold text-textMuted hover:text-white transition-colors relative">
                    Projects
                </a>
                <a href="contact.html" class="nav-link font-sans text-xs font-semibold text-textMuted hover:text-white transition-colors relative">
                    Network
                </a>
            </div>

            <!-- CTA/Status -->
            <div class="hidden md:flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accentPrimary opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-accentPrimary"></span>
                </span>
                <span class="font-mono text-[9px] uppercase tracking-widest text-textMuted">System Active</span>
            </div>
            
            <!-- Mobile Toggle -->
            <button class="md:hidden text-white/70 hover:text-white px-2">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow pt-40 pb-24 relative z-10 flex items-center">
        
        <section class="container mx-auto px-4 max-w-5xl font-sans">
            <div class="grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
                
                <!-- Communication Terminal Left -->
                <div class="reveal flex flex-col justify-center">
                    <div class="mb-8">
                        <span class="tech-header block mb-4">ESTABLISH CONNECTION</span>
                        <h2 class="text-4xl text-white font-semibold">Comm-Link</h2>
                    </div>

                    <p class="text-gray-400 font-sans leading-relaxed mb-10 max-w-md">
                        Based in Belfast, UK, and actively open to new positions. Drop a message below to instantiate a secure channel.
                    </p>

                    <div class="space-y-4 font-mono text-sm">
                        <a href="mailto:neetshah08@gmail.com" class="glass-panel rounded-xl p-4 flex items-center gap-4 hover:border-accentPrimary/50 hover:bg-black/40 transition-colors text-gray-300 w-full md:w-4/5 group">
                            <span class="text-accentPrimary w-8 text-center text-lg group-hover:shadow-[0_0_15px_rgba(0,240,255,0.3)] transition-shadow"><i class="fas fa-envelope"></i></span> 
                            <span>neetshah08@gmail.com</span>
                        </a>
                        <a href="https://www.linkedin.com/in/meetanalyst/" target="_blank" class="glass-panel rounded-xl p-4 flex items-center gap-4 hover:border-[#0ea5e9]/50 hover:bg-black/40 transition-colors text-gray-300 w-full md:w-4/5 group">
                            <span class="text-[#0ea5e9] w-8 text-center text-lg group-hover:shadow-[0_0_15px_rgba(14,165,233,0.3)] transition-shadow"><i class="fab fa-linkedin-in"></i></span> 
                            <span>/in/meetanalyst</span>
                        </a>
                        <div class="glass-panel rounded-xl p-4 flex items-center gap-4 text-gray-300 w-full md:w-4/5">
                            <span class="text-accentSecondary w-8 text-center text-lg"><i class="fas fa-map-marker-alt"></i></span> 
                            <span>Belfast, UK</span>
                        </div>
                    </div>
                </div>

                <!-- Form Widget -->
                <div class="glass-panel relative reveal [transition-delay:200ms] group">
                    <div class="absolute inset-0 bg-gradient-to-br from-accentPrimary/5 via-transparent to-accentSecondary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"></div>
                    
                    <form class="p-10 space-y-6 relative z-10">
                        <div class="space-y-2">
                            <label for="name" class="block font-mono text-[10px] text-textMuted uppercase tracking-widest pl-1">Ident</label>
                            <input type="text" id="name" required class="glass-input" placeholder="Name" />
                        </div>
                        
                        <div class="space-y-2">
                            <label for="email" class="block font-mono text-[10px] text-textMuted uppercase tracking-widest pl-1">Return Address</label>
                            <input type="email" id="email" required class="glass-input" placeholder="Email" />
                        </div>
                        
                        <div class="space-y-2">
                            <label for="message" class="block font-mono text-[10px] text-textMuted uppercase tracking-widest pl-1">Payload</label>
                            <textarea id="message" rows="5" required class="glass-input resize-none" placeholder="Message content..."></textarea>
                        </div>
                        
                        <button type="submit" class="w-full mt-6 bg-accentPrimary text-darkBg font-semibold rounded-xl py-4 hover:shadow-[0_0_20px_rgba(0,240,255,0.4)] hover:bg-white transition-all flex items-center justify-center gap-3 tracking-wide">
                            Transmit Packet <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </form>
                </div>
                
            </div>
        </section>
    </main>

    <!-- Base Footer -->
    <footer class="w-full border-t border-borderColors bg-black/20 py-8 relative z-10 font-mono">
        <div class="container mx-auto px-6 text-center flex flex-col items-center gap-2">
            <span class="text-xs text-textMuted tracking-widest uppercase">
                <i class="fas fa-server mr-2"></i> SYSTEM_EOF // © <span id="year"></span> MEET SHAH.
            </span>
        </div>
    </footer>

    <!-- JS Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('year').textContent = new Date().getFullYear();

            // Smooth Scroll Reveal
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });
            
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

            // Active Nav link highlight
            const navItems = document.querySelectorAll('.nav-link');
            const currentPath = window.location.pathname;
            
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (currentPath.endsWith(href) || (currentPath.endsWith('/') && href === 'contact.html')) {
                    item.classList.add('text-white', 'bg-white/10', 'px-3', 'py-1', 'rounded-full');
                    item.classList.remove('text-textMuted');
                }
            });
        });
    </script>
</body>
</html>
